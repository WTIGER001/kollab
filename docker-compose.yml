services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: arkollab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  go-backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/arkollab?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI}
      PORT: 8080
      OFFICE_CONVERTER_URL: http://media-preview:8082/api/v1/preview
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
      - media-preview

  media-preview:
    build:
      context: ../media-preview
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 8082
      LIBREOFFICE_PATH: /usr/bin/soffice
    ports:
      - "8082:8082"
    volumes:
      - ./uploads:/app/uploads

  caddy:
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - go-backend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
